kind = "web"
previewPath = "/"
title = "Agent Canvas"
version = "1.0.0"
id = "artifacts/opengrid-canvas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22752

[services.development]
run = "pnpm --filter @workspace/opengrid-canvas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/opengrid-canvas", "run", "build" ]
publicDir = "artifacts/opengrid-canvas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22752"
BASE_PATH = "/"
