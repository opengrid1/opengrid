# Open Grid — single-instance deployment.
# Usage:
#   SESSION_SECRET=$(openssl rand -hex 32) docker compose up -d
#
# Put nginx/Caddy/Cloudflare in front for TLS; this container speaks plain
# HTTP/WS on 8080 by design.

services:
  opengrid:
    build: .
    # image: ghcr.io/opengrid1/opengrid:latest    # uncomment to pin a tag
    container_name: opengrid
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET — openssl rand -hex 32}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:8080}"
      # Tune for your host. Default keeps a single VPS happy.
      MAX_SESSIONS: "64"
      MAX_USER_SESSIONS: "500"
    volumes:
      - workspaces:/var/lib/opengrid
    # Defence in depth — limits the blast radius of any single user session.
    # Adjust to your hardware.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  workspaces:
    driver: local
