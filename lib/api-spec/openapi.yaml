openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Open Grid API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI proxy operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: Proxy AI chat request
      description: Forwards a chat request to the specified AI provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/models:
    get:
      operationId: listAiModels
      tags: [ai]
      summary: List available AI models
      description: Returns available models grouped by provider
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModelsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AiMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
      required:
        - role
        - content

    AiChatInput:
      type: object
      properties:
        provider:
          type: string
          enum: [claude, openai, gemini]
        model:
          type: string
        apiKey:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AiMessage"
        systemPrompt:
          type: ["string", "null"]
      required:
        - provider
        - model
        - apiKey
        - messages

    ChatResult:
      type: object
      properties:
        content:
          type: string
        model:
          type: string
        provider:
          type: string
      required:
        - content
        - model
        - provider

    AiModel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
          enum: [claude, openai, gemini]
        contextWindow:
          type: integer
      required:
        - id
        - name
        - provider
        - contextWindow

    AiModelsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/AiModel"
      required:
        - models

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
